let contentDeck=[],deckPrepared=false,generatedPoemCount=0,generatedLineCount=0;function shuffle(items){const copy=[...items];for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]]}return copy}function prepareDeck(){if(deckPrepared)return;contentDeck=shuffle([...POEMS,...LOVE_LINES,...PHOTO_MOMENTS]);deckPrepared=true}function makeNewPoem(){generatedPoemCount++;const openings=['I found another star and gave it your name','The night leaned close to hear about you','My heart opened one more secret window','A new little forever woke inside me','The sky wrote softly in gold again','My love made another orbit around your smile','A secret candle lit itself for you','Another page of forever opened quietly'];const middles=['because your smile still teaches darkness how to glow','because even silence becomes music near your thought','because loving you keeps making the world larger','because every birthday candle looks like a promise','because my wishes keep choosing your happiness first','because your name turns ordinary air into music','because my heart keeps finding new ways to arrive','because July 4 learned romance from you'];const endings=['so I placed this line below the last, and loved you further.','so the universe scrolled on, refusing to finish us.','so I smiled like a fool and called it destiny.','so July 4 became less a date and more a festival of you.','so forever added another page to Our Universe.','so I sent one more star to stand guard over your happiness.','so this page made another promise it has no plan to break.','so my love stepped forward again, freshly dressed in gold.'];return{type:'poem',text:openings[generatedPoemCount%openings.length]+',\n'+middles[(generatedPoemCount*2)%middles.length]+',\n'+endings[(generatedPoemCount*3)%endings.length],signature:'-- new star '+generatedPoemCount+', only for Muskan'}}function makeNewLine(){generatedLineCount++;const starts=['Muskan,','Birthday girl,','My universe,','My favorite person,','Love,','Pretty trouble,','My July miracle,','Moonlight,'];const middles=['you just made this scroll fall in love again','even the stars are asking for your secret','Santu is still not normal about your smile','you are making forever look easy','this page is blushing because you are here','your birthday deserves a sky with no ending','you are the reason the universe keeps writing','my heart just refreshed and chose you again'];return{type:'message',text:'"'+starts[generatedLineCount%starts.length]+' '+middles[(generatedLineCount*3)%middles.length]+'."'}}function makeFreshMoment(){return (generatedPoemCount+generatedLineCount)%2===0?makeNewPoem():makeNewLine()}function nextMoment(){if(cursor===0)return FIRST_POEM;if(cursor===1)return MILESTONES[0];if(cursor===5)return MILESTONES[1];if(cursor===13)return MILESTONES[2];prepareDeck();return contentDeck.length?contentDeck.pop():makeFreshMoment()}const FLOATERS=['you are my favorite hello and hardest goodbye','Muskan, I mean it every time','yours. always was, always will be','still not over how lucky i got','happy birthday, my whole heart','every star up there has your name on it now','July 4 belongs to you','Our Universe is still expanding','Santu loves Muskan. Endlessly.'];
const canvas=document.getElementById('stars'),ctx=canvas.getContext('2d');let W,H,stars=[],shootingStars=[];function resize(){W=canvas.width=window.innerWidth;H=canvas.height=document.documentElement.scrollHeight;canvas.style.height=H+'px';buildStars()}function buildStars(){stars=[];const count=Math.floor((W*H)/9000);for(let i=0;i<count;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+.3,phase:Math.random()*Math.PI*2,speed:Math.random()*.015+.005,hue:Math.random()>.85?'gold':'white'})}function maybeSpawnShootingStar(){if(Math.random()<.0035)shootingStars.push({x:Math.random()*W*.6+W*.1,y:window.scrollY+Math.random()*window.innerHeight*.4,len:Math.random()*80+60,speed:Math.random()*10+8,life:1})}function draw(t){ctx.clearRect(0,0,W,H);for(const s of stars){const tw=.55+Math.sin(t*s.speed+s.phase)*.45;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.hue==='gold'?'rgba(212,175,122,'+tw+')':'rgba(237,233,244,'+tw+')';ctx.fill()}maybeSpawnShootingStar();shootingStars.forEach(s=>{ctx.save();ctx.strokeStyle='rgba(247,223,165,'+s.life+')';ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.len,s.y-s.len*.4);ctx.stroke();ctx.restore();s.x+=s.speed;s.y+=s.speed*.4;s.life-=.018});shootingStars=shootingStars.filter(s=>s.life>0);requestAnimationFrame(draw)}window.addEventListener('resize',resize);resize();requestAnimationFrame(draw);
const timeline=document.getElementById('timeline'),sentinel=document.getElementById('sentinel');let cursor=0,sideToggle=0;function renderPhoto(m){const el=document.createElement('div');el.className='photo-frame';if(m.src)el.innerHTML='<img src="'+m.src+'" alt="'+m.caption+'"><div class="photo-caption">'+m.caption+'</div>';else el.innerHTML='<div class="photo-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="5" width="18" height="14" rx="1.5"/><circle cx="9" cy="10" r="2"/><path d="M21 16l-5-5-4 4-3-3-6 6"/></svg><span>photo goes here<br>(add a path in PHOTO_MOMENTS later)</span></div><div class="photo-caption">'+m.caption+'</div>';return el}function renderPoem(m){const el=document.createElement('div');el.className='poem-card';el.innerHTML='<p>'+m.text+'</p><span class="poem-signature">'+(m.signature||'')+'</span>';return el}function renderMessage(m){const el=document.createElement('div');el.className='note-card';el.textContent=m.text;return el}function renderMilestone(m){const el=document.createElement('div');el.className='milestone';el.innerHTML='<div class="date">'+m.date+'</div><div class="label">'+m.label+'</div>';return el}function appendBatch(n){for(let i=0;i<n;i++){const fullDeckSize=Math.max(1,POEMS.length+LOVE_LINES.length+PHOTO_MOMENTS.length),loopIndex=Math.floor(cursor/fullDeckSize),m=nextMoment();cursor++;if(cursor%fullDeckSize===1&&loopIndex>0){const div=document.createElement('div');div.className='loop-divider';div.innerHTML='<span class="infinity">&infin;</span>fresh words only from here';timeline.appendChild(div)}const card=document.createElement('div');let inner;if(m.type==='photo'){inner=renderPhoto(m);card.classList.add('card',sideToggle%2===0?'left':'right');sideToggle++}else if(m.type==='poem'){inner=renderPoem(m);card.classList.add('card',sideToggle%2===0?'right':'left');sideToggle++}else if(m.type==='message'){inner=renderMessage(m);card.classList.add('card','center')}else if(m.type==='milestone'){inner=renderMilestone(m);card.classList.add('card','center')}const node=document.createElement('div');node.className='node';if(card.classList.contains('left')||card.classList.contains('right'))card.appendChild(node);card.appendChild(inner);timeline.appendChild(card)}timeline.parentNode.appendChild(sentinel);observeReveal()}const revealObserver=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');revealObserver.unobserve(e.target)}})},{threshold:.15});function observeReveal(){document.querySelectorAll('.card:not(.visible)').forEach(c=>revealObserver.observe(c))}const loadObserver=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){appendBatch(6);resize()}})},{rootMargin:'800px 0px 800px 0px'});appendBatch(10);resize();loadObserver.observe(sentinel);function spawnFloater(){const el=document.createElement('div');el.className='float-msg';el.textContent=FLOATERS[Math.floor(Math.random()*FLOATERS.length)];el.style.left=Math.random()*70+10+'vw';el.style.top=Math.random()*60+20+'vh';el.style.setProperty('--drift',Math.random()*60-30+'px');document.body.appendChild(el);setTimeout(()=>el.remove(),13500)}setInterval(spawnFloater,7000);setTimeout(spawnFloater,1500);
</script></body></html>
